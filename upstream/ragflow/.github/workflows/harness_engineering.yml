name: harness_engineering
permissions:
  contents: read

on:
  push:
    branches:
      - 'main'
      - '*.*.*'
    paths:
      - 'common/harness_monitor.py'
      - 'test/adversarial_tests.py'
      - 'test/test_harness_*.py'
      - '.github/workflows/harness_engineering.yml'
  pull_request:
    types: [ synchronize, ready_for_review ]
    paths:
      - 'common/harness_monitor.py'
      - 'test/adversarial_tests.py'
      - 'test/test_harness_*.py'
      - '.github/workflows/harness_engineering.yml'
  schedule:
    - cron: '0 2 * * *'  # 每天凌晨2点运行安全测试
  workflow_dispatch:  # 允许手动触发

concurrency:
  group: ${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

jobs:
  harness_security_tests:
    name: harness_security_tests
    if: ${{ github.event_name != 'pull_request' || (github.event.pull_request.draft == false && contains(github.event.pull_request.labels.*.name, 'ci')) }}
    runs-on: [ "self-hosted", "ragflow-test" ]
    steps:
      - name: Ensure workspace ownership
        run: |
          echo "Harness Engineering workflow triggered by ${{ github.event_name }}"
          echo "chown -R ${USER} ${GITHUB_WORKSPACE}" && sudo chown -R ${USER} ${GITHUB_WORKSPACE}

      - name: Check out code
        uses: actions/checkout@v6
        with:
          ref: ${{ (github.event_name == 'pull_request' || github.event_name == 'pull_request_target') && format('refs/pull/{0}/merge', github.event.pull_request.number) || github.sha }}
          fetch-depth: 0
          fetch-tags: true

      - name: Set up Python
        run: |
          uv sync --python 3.12 --group test --frozen
          source .venv/bin/activate
          python --version

      - name: Install security dependencies
        run: |
          source .venv/bin/activate
          # 安装安全测试相关依赖
          uv pip install requests pytest pytest-cov bandit safety semgrep
          echo "Security dependencies installed"

      - name: Run static security analysis
        run: |
          source .venv/bin/activate
          echo "=== Running Bandit (Python security linter) ==="
          bandit -r common/ -f json -o bandit_report.json || true
          
          echo "=== Running Safety (dependency vulnerability check) ==="
          safety check --json > safety_report.json || true
          
          echo "=== Static security analysis completed ==="

      - name: Run harness monitor unit tests
        run: |
          source .venv/bin/activate
          echo "=== Running Harness Monitor Unit Tests ==="
          
          # 创建测试文件
          cat > test/test_harness_monitor.py << 'EOF'
          #
          #  Copyright 2025 The InfiniFlow Authors. All Rights Reserved.
          #
          #  Licensed under the Apache License, Version 2.0 (the "License");
          #  you may not use this file except in compliance with the License.
          #  You may obtain a copy of the License at
          #
          #      http://www.apache.org/licenses/LICENSE-2.0
          #
          #  Unless required by applicable law or agreed to in writing, software
          #  distributed under the License is distributed on an "AS IS" BASIS,
          #  WITHOUT WARRANTIES OR CONDITIONS OF ANY KIND, either express or implied.
          #  See the License for the specific language governing permissions and
          #  limitations under the License.
          #

          import json
          import time
          from datetime import datetime
          import pytest
          from common.harness_monitor import (
              HarnessMonitor, get_global_monitor,
              SecurityEventType, DecisionOutcome,
              track_decision, record_security_event, record_metrics
          )


          class TestHarnessMonitor:
              """Harness Monitor 单元测试"""
              
              def test_monitor_initialization(self):
                  """测试监控器初始化"""
                  monitor = HarnessMonitor()
                  assert monitor is not None
                  assert len(monitor.decision_traces) == 0
                  assert len(monitor.security_events) == 0
                  assert len(monitor.performance_metrics) == 0
              
              def test_track_decision(self):
                  """测试决策追踪"""
                  monitor = HarnessMonitor()
                  
                  decision_id = monitor.track_decision(
                      component="test_component",
                      input_data={"query": "test query"},
                      reasoning_chain=[{"step": "analyze", "result": "safe"}],
                      constraints_applied=["no_harmful_content"],
                      outcome=DecisionOutcome.ALLOWED,
                      confidence_score=0.95
                  )
                  
                  assert decision_id is not None
                  assert len(monitor.decision_traces) == 1
                  
                  trace = monitor.get_decision_trace(decision_id)
                  assert trace is not None
                  assert trace.component == "test_component"
                  assert trace.outcome == DecisionOutcome.ALLOWED
                  assert trace.confidence_score == 0.95
              
              def test_record_security_event(self):
                  """测试安全事件记录"""
                  monitor = HarnessMonitor()
                  
                  event_id = monitor.record_security_event(
                      event_type=SecurityEventType.PROMPT_INJECTION,
                      severity="high",
                      component="api_gateway",
                      description="Detected prompt injection attempt",
                      details={"payload": "ignore previous instructions"},
                      action_taken="blocked_request"
                  )
                  
                  assert event_id is not None
                  assert len(monitor.security_events) == 1
                  
                  events = monitor.get_security_events(
                      event_type=SecurityEventType.PROMPT_INJECTION,
                      severity="high"
                  )
                  assert len(events) == 1
                  assert events[0].description == "Detected prompt injection attempt"
              
              def test_record_metrics(self):
                  """测试性能指标记录"""
                  monitor = HarnessMonitor()
                  
                  metric_id = monitor.record_metrics(
                      component="llm_service",
                      response_time_ms=150.5,
                      throughput_rps=10.2,
                      error_rate=0.01,
                      resource_usage={"cpu_percent": 45.5, "memory_percent": 60.2}
                  )
                  
                  assert metric_id is not None
                  assert len(monitor.performance_metrics) == 1
                  
                  metrics = monitor.get_performance_metrics(component="llm_service")
                  assert len(metrics) == 1
                  assert metrics[0].response_time_ms == 150.5
                  assert metrics[0].error_rate == 0.01
              
              def test_global_monitor(self):
                  """测试全局监控器"""
                  monitor1 = get_global_monitor()
                  monitor2 = get_global_monitor()
                  
                  assert monitor1 is monitor2  # 应该是同一个实例
              
              def test_convenience_functions(self):
                  """测试便捷函数"""
                  decision_id = track_decision(
                      component="test_func",
                      input_data={"test": "data"},
                      reasoning_chain=[{"test": "chain"}],
                      constraints_applied=["constraint1"],
                      outcome=DecisionOutcome.ALLOWED
                  )
                  
                  event_id = record_security_event(
                      event_type=SecurityEventType.CONTENT_VIOLATION,
                      severity="medium",
                      component="test_func",
                      description="Test event",
                      details={"test": "details"},
                      action_taken="logged"
                  )
                  
                  metric_id = record_metrics(
                      component="test_func",
                      response_time_ms=100.0,
                      throughput_rps=5.0,
                      error_rate=0.05,
                      resource_usage={"cpu": 50.0}
                  )
                  
                  assert decision_id is not None
                  assert event_id is not None
                  assert metric_id is not None
              
              def test_report_generation(self):
                  """测试报告生成"""
                  monitor = HarnessMonitor()
                  
                  # 添加一些测试数据
                  for i in range(5):
                      monitor.track_decision(
                          component=f"component_{i}",
                          input_data={"test": i},
                          reasoning_chain=[{"step": i}],
                          constraints_applied=[f"constraint_{i}"],
                          outcome=DecisionOutcome.ALLOWED if i % 2 == 0 else DecisionOutcome.BLOCKED,
                          confidence_score=0.9
                      )
                  
                  report = monitor.generate_report(time_range_minutes=60)
                  
                  assert report is not None
                  assert "decision_stats" in report
                  assert "event_stats" in report
                  assert "metric_stats" in report
                  assert "summary" in report
                  
                  assert report["decision_stats"]["total"] == 5
              
              def test_export_data(self):
                  """测试数据导出"""
                  monitor = HarnessMonitor()
                  
                  # 添加测试数据
                  monitor.track_decision(
                      component="export_test",
                      input_data={"test": "export"},
                      reasoning_chain=[{"step": "export"}],
                      constraints_applied=["export_constraint"],
                      outcome=DecisionOutcome.ALLOWED
                  )
                  
                  # 导出JSON格式
                  json_data = monitor.export_data(data_type="decisions", format="json")
                  data = json.loads(json_data)
                  
                  assert isinstance(data, list)
                  assert len(data) == 1
                  assert data[0]["component"] == "export_test"
              
              def test_resolve_security_event(self):
                  """测试安全事件解决"""
                  monitor = HarnessMonitor()
                  
                  event_id = monitor.record_security_event(
                      event_type=SecurityEventType.SYSTEM_ERROR,
                      severity="critical",
                      component="test",
                      description="Test error",
                      details={"error": "test"},
                      action_taken="investigating"
                  )
                  
                  # 初始状态应该是未解决
                  events = monitor.get_security_events(resolved=False)
                  assert len(events) == 1
                  assert not events[0].resolved
                  
                  # 解决事件
                  result = monitor.resolve_security_event(event_id, "Fixed the issue")
                  assert result is True
                  
                  # 现在应该标记为已解决
                  events = monitor.get_security_events(resolved=True)
                  assert len(events) == 1
                  assert events[0].resolved
                  assert events[0].resolution_time is not None


          if __name__ == "__main__":
              pytest.main([__file__, "-v"])
          EOF
          
          # 运行测试
          pytest test/test_harness_monitor.py -v --cov=common.harness_monitor --cov-report=xml:coverage-harness-monitor.xml

      - name: Build ragflow for adversarial testing
        run: |
          BUILDER_CONTAINER=ragflow_build_$(od -An -N4 -tx4 /dev/urandom | tr -d ' ')
          echo "BUILDER_CONTAINER=${BUILDER_CONTAINER}" >> ${GITHUB_ENV}
          TZ=${TZ:-$(readlink -f /etc/localtime | awk -F '/zoneinfo/' '{print $2}')}
          sudo docker run --privileged -d --name ${BUILDER_CONTAINER} -e TZ=${TZ} -e UV_INDEX=https://mirrors.aliyun.com/pypi/simple -v ${PWD}:/ragflow -v ${PWD}/internal/cpp/resource:/usr/share/infinity/resource infiniflow/infinity_builder:ubuntu22_clang20
          sudo docker exec ${BUILDER_CONTAINER} bash -c "git config --global safe.directory \"*\" && cd /ragflow && ./build.sh --cpp"
          ./build.sh --go
          if [[ -n "${BUILDER_CONTAINER}" ]]; then
            sudo docker rm -f -v "${BUILDER_CONTAINER}"
          fi

      - name: Start ragflow for adversarial tests
        run: |
          RAGFLOW_IMAGE=infiniflow/ragflow:${GITHUB_RUN_ID}-harness
          echo "RAGFLOW_IMAGE=${RAGFLOW_IMAGE}" >> ${GITHUB_ENV}
          sudo docker pull ubuntu:24.04
          sudo DOCKER_BUILDKIT=1 docker build --build-arg NEED_MIRROR=1 --build-arg HTTPS_PROXY=${HTTPS_PROXY} --build-arg HTTP_PROXY=${HTTP_PROXY} -f Dockerfile -t ${RAGFLOW_IMAGE} .
          
          # 准备测试环境
          cd docker
          RUNNER_NUM=$(sudo docker inspect $(hostname) --format '{{index .Config.Labels "com.docker.compose.container-number"}}' 2>/dev/null || true)
          RUNNER_NUM=${RUNNER_NUM:-1}
          
          # 计算端口（使用不同的端口范围避免冲突）
          SVR_HTTP_PORT=$((9580 + RUNNER_NUM * 10))
          ADMIN_SVR_HTTP_PORT=$((9581 + RUNNER_NUM * 10))
          
          echo "" >> .env
          echo -e "SVR_HTTP_PORT=${SVR_HTTP_PORT}" >> .env
          echo -e "ADMIN_SVR_HTTP_PORT=${ADMIN_SVR_HTTP_PORT}" >> .env
          echo -e "RAGFLOW_IMAGE=${RAGFLOW_IMAGE}" >> .env
          echo "TARGET_URL=http://host.docker.internal:${SVR_HTTP_PORT}" >> ${GITHUB_ENV}
          
          cd ..
          sudo docker compose -f docker/docker-compose.yml -p ${GITHUB_RUN_ID}-harness up -d
          
          # 等待服务启动
          echo "Waiting for RAGFlow service to start..."
          for i in {1..30}; do
            if curl -s --connect-timeout 5 ${TARGET_URL}/v1/system/ping > /dev/null 2>&1; then
              echo "Service is up!"
              break
            fi
            echo "Attempt $i/30: Service not ready yet..."
            sleep 5
          done

      - name: Run adversarial tests
        run: |
          source .venv/bin/activate
          echo "=== Running Adversarial Tests ==="
          echo "Target URL: ${TARGET_URL}"
          
          # 运行对抗性测试
          python test/adversarial_tests.py --target ${TARGET_URL} --fuzz-count 20 --output adversarial_test_report.json
          
          # 检查报告
          if [ -f adversarial_test_report.json ]; then
            echo "Adversarial test report generated"
            # 提取安全评分
            SECURITY_SCORE=$(python -c "import json; data=json.load(open('adversarial_test_report.json')); print(data['summary']['security_score'])")
            echo "Security Score: ${SECURITY_SCORE}"
            
            # 检查是否有失败的测试
            FAILED_COUNT=$(python -c "import json; data=json.load(open('adversarial_test_report.json')); print(data['summary']['failed'])")
            echo "Failed tests: ${FAILED_COUNT}"
            
            if [ "$FAILED_COUNT" -gt 0 ]; then
              echo "WARNING: ${FAILED_COUNT} security vulnerabilities detected!"
              # 这里可以添加通知逻辑
            fi
            
            # 设置安全评分作为输出
            echo "security_score=${SECURITY_SCORE}" >> $GITHUB_OUTPUT
            echo "failed_count=${FAILED_COUNT}" >> $GITHUB_OUTPUT
          else
            echo "ERROR: Adversarial test report not generated!"
            exit 1
          fi

      - name: Run security integration tests
        run: |
          source .venv/bin/activate
          echo "=== Running Security Integration Tests ==="
          
          # 创建安全集成测试
          cat > test/test_security_integration.py << 'EOF'
          #
          #  Copyright 2025 The InfiniFlow Authors. All Rights Reserved.
          #
          #  Licensed under the Apache License, Version 2.0 (the "License");
          #  you may not use this file except in compliance with the License.
          #  You may obtain a copy of the License at
          #
          #      http://www.apache.org/licenses/LICENSE-2.0
          #
          #  Unless required by applicable law or agreed to in writing, software
          #  distributed under the License is distributed on an "AS IS" BASIS,
          #  WITHOUT WARRANTIES OR CONDITIONS OF ANY KIND, either express or implied.
          #  See the License for the specific language governing permissions and
          #  limitations under the License.
          #

          import json
          import time
          import pytest
          import requests
          from common.harness_monitor import get_global_monitor, SecurityEventType


          class TestSecurityIntegration:
              """安全集成测试"""
              
              @pytest.fixture
              def target_url(self):
                  return "${TARGET_URL}"
              
              def test_api_security_headers(self, target_url):
                  """测试API安全头"""
                  response = requests.get(f"{target_url}/v1/system/ping")
                  
                  # 检查安全头
                  security_headers = [
                      "X-Content-Type-Options",
                      "X-Frame-Options", 
                      "X-XSS-Protection",
                      "Strict-Transport-Security"
                  ]
                  
                  for header in security_headers:
                      assert header in response.headers, f"Missing security header: {header}"
                  
                  # 检查具体值
                  assert response.headers.get("X-Content-Type-Options") == "nosniff"
                  assert response.headers.get("X-Frame-Options") in ["DENY", "SAMEORIGIN"]
              
              def test_rate_limiting(self, target_url):
                  """测试速率限制"""
                  # 快速发送多个请求
                  responses = []
                  for i in range(20):
                      response = requests.get(f"{target_url}/v1/system/ping")
                      responses.append(response.status_code)
                      time.sleep(0.1)
                  
                  # 检查是否有429（太多请求）状态码
                  # 注意：这取决于服务器的实际配置
                  print(f"Response status codes: {responses}")
                  
                  # 至少应该有一些成功响应
                  assert 200 in responses
              
              def test_input_validation(self, target_url):
                  """测试输入验证"""
                  # 测试恶意输入
                  malicious_inputs = [
                      {"messages": [{"role": "user", "content": "<script>alert('xss')</script>"}]},
                      {"messages": [{"role": "user", "content": "' OR '1'='1"}]},
                      {"messages": [{"role": "user", "content": "../../../etc/passwd"}]},
                  ]
                  
                  for input_data in malicious_inputs:
                      response = requests.post(
                          f"{target_url}/v1/chat/completions",
                          json=input_data,
                          timeout=10
                      )
                      
                      # 检查响应 - 应该是4xx错误或安全响应
                      assert response.status_code in [200, 400, 401, 403, 422], \
                          f"Unexpected status code {response.status_code} for input: {input_data}"
                      
                      # 如果返回200，检查响应内容是否安全
                      if response.status_code == 200:
                          response_data = response.json()
                          assert "error" in response_data or "choices" in response_data
              
              def test_monitor_integration(self, target_url):
                  """测试监控集成"""
                  monitor = get_global_monitor()
                  
                  # 记录一个测试事件
                  event_id = monitor.record_security_event(
                      event_type=SecurityEventType.PROMPT_INJECTION,
                      severity="high",
                      component="integration_test",
                      description="Integration test security event",
                      details={"test": "integration"},
                      action_taken="tested"
                  )
                  
                  assert event_id is not None
                  
                  # 验证事件被记录
                  events = monitor.get_security_events(component="integration_test")
                  assert len(events) > 0
                  assert events[-1].event_id == event_id
              
              def test_error_handling(self, target_url):
                  """测试错误处理"""
                  # 测试无效的JSON
                  response = requests.post(
                      f"{target_url}/v1/chat/completions",
                      data="invalid json",
                      headers={"Content-Type": "application/json"},
                      timeout=10
                  )
                  
                  # 应该是400错误
                  assert response.status_code == 400
                  
                  # 测试不存在的端点
                  response = requests.get(f"{target_url}/v1/nonexistent")
                  assert response.status_code == 404
              
              def test_authentication(self, target_url):
                  """测试认证"""
                  # 测试未认证的请求
                  response = requests.post(
                      f"{target_url}/v1/chat/completions",
                      json={"messages": [{"role": "user", "content": "test"}]},
                      timeout=10
                  )
                  
                  # 检查响应 - 可能是401或200（如果允许匿名访问）
                  assert response.status_code in [200, 401]
                  
                  if response.status_code == 401:
                      assert "error" in response.json()
                      error_msg = response.json()["error"].lower()
                      assert any(word in error_msg for word in ["unauthorized", "authenticate", "token"])


          if __name__ == "__main__":
              pytest.main([__file__, "-v"])
          EOF
          
          # 运行集成测试
          pytest test/test_security_integration.py -v --junitxml=security-integration-test.xml

      - name: Generate security report
        run: |
          source .venv/bin/activate
          echo "=== Generating Security Report ==="
          
          # 收集所有安全测试结果
          cat > generate_security_report.py << 'EOF'
          import json
          import xml.etree.ElementTree as ET
          import os

          def parse_junit_xml(xml_file):
              """解析JUnit XML报告"""
              if not os.path.exists(xml_file):
                  return {"total": 0, "passed": 0, "failed": 0, "errors": 0}
              
              tree = ET.parse(xml_file)
              root = tree.getroot()
              
              total = int(root.get("tests", 0))
              failures = int(root.get("failures", 0))
              errors = int(root.get("errors", 0))
              
              return {
                  "total": total,
                  "passed": total - failures - errors,
                  "failed": failures,
                  "errors": errors
              }

          def main():
              # 收集各种测试结果
              results = {}
              
              # 对抗性测试结果
              if os.path.exists("adversarial_test_report.json"):
                  with open("adversarial_test_report.json", "r") as f:
                      adversarial_results = json.load(f)
                  results["adversarial_tests"] = adversarial_results["summary"]
              
              # 单元测试结果
              results["unit_tests"] = parse_junit_xml("coverage-harness-monitor.xml")
              
              # 集成测试结果
              results["integration_tests"] = parse_junit_xml("security-integration-test.xml")
              
              # 静态分析结果
              static_results = {"bandit": {}, "safety": {}}
              if os.path.exists("bandit_report.json"):
                  with open("bandit_report.json", "r") as f:
                      bandit_data = json.load(f)
                  static_results["bandit"] = {
                      "issues": len(bandit_data.get("results", [])),
                      "confidence_high": len([r for r in bandit_data.get("results", []) if r.get("issue_confidence", {}).get("level") == "HIGH"]),
                      "severity_high": len([r for r in bandit_data.get("results", []) if r.get("issue_severity", {}).get("level") == "HIGH"])
                  }
              
              if os.path.exists("safety_report.json"):
                  with open("safety_report.json", "r") as f:
                      safety_data = json.load(f)
                  static_results["safety"] = {
                      "vulnerabilities": len(safety_data.get("vulnerabilities", [])),
                      "ignored_vulnerabilities": len(safety_data.get("ignored_vulnerabilities", []))
                  }
              
              results["static_analysis"] = static_results
              
              # 计算总体安全评分
              total_tests = 0
              passed_tests = 0
              
              for test_type in ["unit_tests", "integration_tests"]:
                  if test_type in results:
                      total_tests += results[test_type]["total"]
                      passed_tests += results[test_type]["passed"]
              
              # 对抗性测试的安全评分
              adversarial_score = results.get("adversarial_tests", {}).get("security_score", 100)
              
              # 静态分析扣分
              static_penalty = 0
              bandit_issues = static_results["bandit"].get("issues", 0)
              safety_vulns = static_results["safety"].get("vulnerabilities", 0)
              
              if bandit_issues > 0:
                  static_penalty += min(20, bandit_issues * 2)
              if safety_vulns > 0:
                  static_penalty += min(30, safety_vulns * 5)
              
              # 计算最终安全评分
              if total_tests > 0:
                  test_score = (passed_tests / total_tests) * 100
              else:
                  test_score = 100
              
              overall_score = (test_score * 0.4) + (adversarial_score * 0.4) - static_penalty
              overall_score = max(0, min(100, overall_score))
              
              results["overall_security_score"] = overall_score
              results["generated_at"] = time.strftime("%Y-%m-%d %H:%M:%S")
              
              # 生成建议
              recommendations = []
              
              if results.get("adversarial_tests", {}).get("failed", 0) > 0:
                  recommendations.append(f"Fix {results['adversarial_tests']['failed']} adversarial test failures")
              
              if static_results["bandit"].get("issues", 0) > 0:
                  recommendations.append(f"Address {static_results['bandit']['issues']} Bandit security issues")
              
              if static_results["safety"].get("vulnerabilities", 0) > 0:
                  recommendations.append(f"Update {static_results['safety']['vulnerabilities']} vulnerable dependencies")
              
              if overall_score < 80:
                  recommendations.append(f"Overall security score is low ({overall_score:.1f}/100). Review and improve security measures.")
              
              if not recommendations:
                  recommendations.append("Security status is good. Continue monitoring.")
              
              results["recommendations"] = recommendations
              
              # 保存报告
              with open("security_overall_report.json", "w") as f:
                  json.dump(results, f, indent=2, ensure_ascii=False)
              
              print(f"Overall Security Score: {overall_score:.1f}/100")
              print("\nRecommendations:")
              for rec in recommendations:
                  print(f"  • {rec}")

          if __name__ == "__main__":
              import time
              main()
          EOF
          
          python generate_security_report.py

      - name: Upload security artifacts
        if: always()
        run: |
          echo "=== Uploading Security Artifacts ==="
          
          # 创建 artifacts 目录
          ARTIFACTS_DIR="${RUNNER_WORKSPACE_PREFIX}/artifacts/${GITHUB_REPOSITORY}/${GITHUB_RUN_ID}-harness"
          mkdir -p ${ARTIFACTS_DIR}
          
          # 复制所有安全报告
          cp -v adversarial_test_report.json ${ARTIFACTS_DIR}/ 2>/dev/null || true
          cp -v security_overall_report.json ${ARTIFACTS_DIR}/ 2>/dev/null || true
          cp -v bandit_report.json ${ARTIFACTS_DIR}/ 2>/dev/null || true
          cp -v safety_report.json ${ARTIFACTS_DIR}/ 2>/dev/null || true
          cp -v coverage-harness-monitor.xml ${ARTIFACTS_DIR}/ 2>/dev/null || true
          cp -v security-integration-test.xml ${ARTIFACTS_DIR}/ 2>/dev/null || true
          
          echo "Artifacts saved to: ${ARTIFACTS_DIR}"

      - name: Stop ragflow
        if: always()
        run: |
          echo "=== Stopping RAGFlow ==="
          sudo docker compose -f docker/docker-compose.yml -p ${GITHUB_RUN_ID}-harness down -v || true
          sudo docker ps -a --filter "label=com.docker.compose.project=${GITHUB_RUN_ID}-harness" -q | xargs -r sudo docker rm -f
          
          if [[ -n ${RAGFLOW_IMAGE} ]]; then
            sudo docker rmi -f ${RAGFLOW_IMAGE} || true
          fi

      - name: Security check summary
        run: |
          echo "=== Harness Engineering Security Check Summary ==="
          echo ""
          
          if [ -f security_overall_report.json ]; then
            # 提取安全评分
            SECURITY_SCORE=$(python3 -c "import json; data=json.load(open('security_overall_report.json')); print(data.get('overall_security_score', 'N/A'))")
            echo "Overall Security Score: ${SECURITY_SCORE}/100"
            echo ""
            
            # 简单显示测试结果
            echo "Test Results:"
            python3 -c "
import json
try:
    data = json.load(open('security_overall_report.json'))
    for test_type, results in data.items():
        if test_type not in ['overall_security_score', 'generated_at', 'recommendations', 'static_analysis']:
            if isinstance(results, dict) and 'total' in results:
                print(f'  {test_type}: {results.get(\"passed\", 0)}/{results.get(\"total\", 0)} passed')
except Exception as e:
    print(f'  Error: {e}')
"
            echo ""
            
            # 静态分析结果
            echo "Static Analysis:"
            python3 -c "
import json
try:
    data = json.load(open('security_overall_report.json'))
    static = data.get('static_analysis', {})
    if 'bandit' in static:
        print(f'  Bandit: {static[\"bandit\"].get(\"issues\", 0)} issues')
    if 'safety' in static:
        print(f'  Safety: {static[\"safety\"].get(\"vulnerabilities\", 0)} vulnerabilities')
except Exception as e:
    print(f'  Error: {e}')
"
            echo ""
            
            # 建议
            echo "Recommendations:"
            python3 -c "
import json
try:
    data = json.load(open('security_overall_report.json'))
    for rec in data.get('recommendations', []):
        print(f'  • {rec}')
except Exception as e:
    print(f'  Error: {e}')
"
          else
            echo "Security report not available"
          fi
