name: CI

on:
  push:
    branches:
      - main
      - "stage/**"
  pull_request:
    branches:
      - main

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  tbox-pipelines:
    name: tbox-pipelines (lint + tests)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: packages/tbox-pipelines
    steps:
      # 仅检出流水线包，避免整仓（含 upstream/ragflow）克隆导致 git 失败或超时
      - uses: actions/checkout@v5
        with:
          fetch-depth: 1
          sparse-checkout: |
            packages/tbox-pipelines
          sparse-checkout-cone-mode: true

      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - name: Install
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev]"

      - name: Ruff
        run: ruff check src tests

      - name: Ruff format (check only)
        run: ruff format --check src tests

      - uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Validate webhook example JSON (JSON Schema)
        run: |
          npx --yes ajv-cli validate -s docs/webhook_payload.schema.json -d docs/examples/tbox_sync_summary.sample.json
          npx --yes ajv-cli validate -s docs/webhook_payload.schema.json -d docs/examples/tbox_rbac_alert.sample.json

      - name: Pytest
        run: pytest -q
