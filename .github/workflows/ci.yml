name: CI

on:
  push:
    branches:
      - main
      - "stage/**"
  pull_request:
    branches:
      - main

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  tbox-pipelines:
    name: tbox-pipelines (lint + tests)
    runs-on: ubuntu-latest
    outputs:
      alert_docs_gate_metrics_kv: ${{ steps.alert_docs_gate.outputs.alert_docs_gate_metrics_kv }}
      alert_docs_gate_metrics_json: ${{ steps.alert_docs_gate.outputs.alert_docs_gate_metrics_json }}
      alert_docs_gate_metrics_json_line: ${{ steps.alert_docs_gate.outputs.alert_docs_gate_metrics_json_line }}
    defaults:
      run:
        working-directory: packages/tbox-pipelines
    steps:
      # 仅检出流水线包，避免整仓（含 upstream/ragflow）克隆导致 git 失败或超时
      - uses: actions/checkout@v5
        with:
          fetch-depth: 1
          sparse-checkout: |
            packages/tbox-pipelines
          sparse-checkout-cone-mode: true

      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - name: Install
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev]"

      - name: Ruff
        run: ruff check src tests scripts

      - name: Ruff format (check only)
        run: ruff format --check src tests scripts

      - name: Pytest
        run: pytest -q

      - name: Validate alert docs links
        id: alert_docs_gate
        run: |
          echo "::group::alert-docs-link-gate"
          validate-alert-docs-links --verbose | tee /tmp/alert_docs_gate.log
          emit-alert-docs-gate-metrics --log-path /tmp/alert_docs_gate.log --emit-json --write-github-output --write-step-summary
          echo "::endgroup::"

      - name: Validate .node-version format
        run: |
          if [[ ! -f .node-version ]]; then
            echo ".node-version is missing (expected a numeric Node major version)." >&2
            exit 1
          fi
          major="$(tr -d '[:space:]' < .node-version)"
          if [[ ! "$major" =~ ^[0-9]+$ ]]; then
            echo ".node-version must be a numeric Node major (got: '$major')." >&2
            exit 1
          fi

      - name: Validate webhook script syntax (bash -n)
        run: bash -n scripts/validate_webhook_examples.sh

      - uses: actions/setup-node@v4
        with:
          node-version-file: packages/tbox-pipelines/.node-version

      # validate_webhook_examples.sh emits canonical `start` JSON only (log_version=2).
      # TBOX_WEBHOOK_LOG_COMPAT_V1 was removed after migration cutoff 2026-06-30 (UTC); see WEBHOOK_CONTRACT.md.
      - name: Validate webhook example JSON (JSON Schema)
        run: bash scripts/validate_webhook_examples.sh

  alert-docs-gate-consumer:
    name: alert-docs-gate consumer (job outputs)
    runs-on: ubuntu-latest
    needs:
      - tbox-pipelines
    steps:
      - uses: actions/checkout@v5
        with:
          fetch-depth: 1
          sparse-checkout: |
            packages/tbox-pipelines
          sparse-checkout-cone-mode: true

      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - name: Install tbox-pipelines (metrics payload validator)
        working-directory: packages/tbox-pipelines
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev]"

      - name: Validate alert docs gate metrics JSON (schema + CLI)
        working-directory: packages/tbox-pipelines
        env:
          METRICS_JSON: ${{ needs.tbox-pipelines.outputs.alert_docs_gate_metrics_json }}
        run: |
          if [[ -z "${METRICS_JSON// }" ]]; then
            echo "empty alert_docs_gate_metrics_json job output" >&2
            exit 1
          fi
          printf '%s' "$METRICS_JSON" | validate-alert-docs-metrics-payload
