name: CI

on:
  push:
    branches:
      - main
      - "stage/**"
  pull_request:
    branches:
      - main

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  tbox-pipelines:
    name: tbox-pipelines (lint + tests)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: packages/tbox-pipelines
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev]"

      - name: Ruff
        run: ruff check src tests

      - name: Ruff format (check only)
        run: ruff format --check src tests

      - name: Pytest
        run: pytest -q
