name: CI

on:
  push:
    branches:
      - main
      - "stage/**"
  pull_request:
    branches:
      - main

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  tbox-pipelines:
    name: tbox-pipelines (lint + tests)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: packages/tbox-pipelines
    steps:
      # 仅检出流水线包，避免整仓（含 upstream/ragflow）克隆导致 git 失败或超时
      - uses: actions/checkout@v5
        with:
          fetch-depth: 1
          sparse-checkout: |
            packages/tbox-pipelines
          sparse-checkout-cone-mode: true

      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - name: Install
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev]"

      - name: Ruff
        run: ruff check src tests scripts

      - name: Ruff format (check only)
        run: ruff format --check src tests scripts

      - name: Pytest
        run: pytest -q

      - name: Validate alert docs links
        run: |
          echo "::group::alert-docs-link-gate"
          python scripts/validate_alert_docs_links.py --verbose | tee /tmp/alert_docs_gate.log
          summary_line="$(sed -n 's/^validate_alert_docs_links.py: summary //p' /tmp/alert_docs_gate.log | head -n 1)"
          if [[ -z "$summary_line" ]]; then
            echo "missing alert docs gate summary line" >&2
            exit 1
          fi
          python -c "import json,sys; s=json.loads(sys.argv[1]); print('alert_docs_gate_metrics ' + f\"summary_version={s.get('summary_version')} required_example_files={s.get('required_example_files')} required_stage_rules={s.get('required_stage_rules')} examples_readme_required_tokens={s.get('examples_readme_required_tokens')}\")" "$summary_line"
          echo "::endgroup::"

      - name: Validate .node-version format
        run: |
          if [[ ! -f .node-version ]]; then
            echo ".node-version is missing (expected a numeric Node major version)." >&2
            exit 1
          fi
          major="$(tr -d '[:space:]' < .node-version)"
          if [[ ! "$major" =~ ^[0-9]+$ ]]; then
            echo ".node-version must be a numeric Node major (got: '$major')." >&2
            exit 1
          fi

      - name: Validate webhook script syntax (bash -n)
        run: bash -n scripts/validate_webhook_examples.sh

      - uses: actions/setup-node@v4
        with:
          node-version-file: packages/tbox-pipelines/.node-version

      # validate_webhook_examples.sh emits canonical `start` JSON only (log_version=2).
      # TBOX_WEBHOOK_LOG_COMPAT_V1 was removed after migration cutoff 2026-06-30 (UTC); see WEBHOOK_CONTRACT.md.
      - name: Validate webhook example JSON (JSON Schema)
        run: bash scripts/validate_webhook_examples.sh
